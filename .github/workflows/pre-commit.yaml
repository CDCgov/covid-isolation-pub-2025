name: pre-commit

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-python@v3
    - uses: r-lib/actions/setup-r@v2
      with:
        use-public-rspm: true
        r-version: 'renv'
    - uses: ./.github/actions/pre-commit
